name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: nylon-mesh
            asset_name: nylon-mesh-linux-gnu-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: nylon-mesh
            asset_name: nylon-mesh-linux-gnu-aarch64
            use-cross: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: nylon-mesh
            asset_name: nylon-mesh-linux-musl-x86_64
            use-cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact_name: nylon-mesh
            asset_name: nylon-mesh-linux-musl-aarch64
            use-cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: nylon-mesh
            asset_name: nylon-mesh-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: nylon-mesh
            asset_name: nylon-mesh-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: nylon-mesh.exe
            asset_name: nylon-mesh-windows-x86_64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary
        run: |
          if [ "${{ matrix.use-cross }}" == 'true' ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare assets
        run: |
          mkdir release-assets
          for dir in artifacts/*; do
            asset_name=$(basename "$dir")
            mv "$dir"/* "release-assets/$asset_name"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
