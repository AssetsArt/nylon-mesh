# threads: 10
# liveness_path: "/_health/live"
# readiness_path: "/_health/ready"
# grace_period_seconds: 0
# graceful_shutdown_timeout_seconds: 0
listen: "0.0.0.0:3000"
# tls:
#   listen: "0.0.0.0:443"
#   certs:
#     - host: "default"
#       cert_path: "cert.pem"
#       key_path: "key.pem"
upstreams:
  - "127.0.0.1:3001"
  # - address: "127.0.0.1:3002"
    # weight: 5
load_balancer_algo: "round_robin"
redis_url: "redis://localhost:6379"
cache:
  t1_cap: 100000
  t1_ttl: 3
  t2_ttl: 30
  status: [200, 404]
  content_types:
    - "text/html"
bypass:
  paths:
    - "/_next/"
    - "/api/"
  ext:
    - ".ico"
    - ".png"
